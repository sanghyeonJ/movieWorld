<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">


<body class="bg-light" layout:fragment="content">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <h2 class="text-center mb-4" th:text="#{login.title}">Movie World 로그인</h2>
                <!-- 로그인 실패 시 메시지 -->
                <div th:if="${param.error}" class="alert alert-danger" th:text="#{login.error}">
                    이메일 또는 비밀번호가 올바르지 않습니다.
                </div>
                <form th:action="@{/login}" method="post">
                    <div class="mb-3">
                        <label for="username" class="form-label" th:text="#{login.email}">이메일</label>
                        <input type="email" id="username" name="username" class="form-control" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label" th:text="#{login.password}">비밀번호</label>
                        <input type="password" id="password" name="password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100" th:text="#{login.submit}">로그인</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
