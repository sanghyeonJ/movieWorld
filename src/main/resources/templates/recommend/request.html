<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">

    <div class="container py-5" layout:fragment="content">
        <h1 class="mb-4" th:text="#{recommend.request.title}">영화 추천</h1>

        <div class="card mb-4">
            <div class="card-body">
                <p class="mb-2">
                    <strong th:text="#{recommend.request.reviewCount}">현재 작성한 리뷰 수:</strong>
                    <span th:text="${reviewCount}">0</span><span th:text="#{recommend.request.reviewCountSuffix}">개</span>
                </p>
                <p class="mb-0" th:if="${canRecommend}">
                    <span class="text-success" th:text="#{recommend.request.canRecommend}">추천을 받을 수 있습니다.</span>
                </p>
                <p class="mb-0 text-danger" th:unless="${canRecommend}" th:text="#{recommend.request.cannotRecommend}">
                    리뷰가 부족하거나 오늘 추천 요청 횟수를 모두 사용했습니다.
                </p>
            </div>
        </div>

        <form th:if="${canRecommend}" id="recommendForm" th:action="@{/recommend}" method="post" onsubmit="showProgressModal()">
            <button type="submit" class="btn btn-primary" id="recommendBtn" th:text="#{recommend.request.submit}">추천 받기</button>
        </form>
        <p th:unless="${canRecommend}" class="text-muted" th:text="#{recommend.request.needMoreReview}">추천을 받으려면 리뷰를 더 작성해 주세요.</p>

        <div class="mt-3">
            <a th:href="@{/}" class="btn btn-outline-secondary" th:text="#{recommend.request.backHome}">메인으로</a>
        </div>

        <!-- 추천 진행 모달 (제출 시 표시) -->
        <div class="modal fade" id="recommendProgressModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="static" data-bs-keyboard="false">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-body text-center py-5">
                        <div class="spinner-border text-primary mb-3" role="status" style="width: 3rem; height: 3rem;">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                        <p class="mb-3" id="recommendProgressText" th:text="#{recommend.request.progress}">AI가 맞춤 추천을 생성하는 중입니다...</p>
                        <div class="progress" style="height: 8px;">
                            <div class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width: 100%"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script th:inline="javascript">
            function showProgressModal() {
                var modalEl = document.getElementById('recommendProgressModal');
                if (modalEl) {
                    var modal = new bootstrap.Modal(modalEl);
                    modal.show();
                }
                var btn = document.getElementById('recommendBtn');
                if (btn) btn.disabled = true;
            }
        </script>
    </div>
</html>
