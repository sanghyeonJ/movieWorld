spring.application.name=movieWorld

# 서버포트설정
server.port=8088

# mysql 연결 설정
spring.datasource.driver-class-name = com.mysql.cj.jdbc.Driver
spring.datasource.url = jdbc:mysql://localhost:3306/movieworlddb?serverTimezone=UTC
spring.datasource.username = movieworld
spring.datasource.password = 1234

# mybatis 설정
mybatis.mapper-locations = classpath:mapper/**/*.xml
#src/main/resources 하위의 mapper폴더 아래 모든 xml파일 및 폴더내의 xml파일
mybatis.type-aliases-package = com.movieWorld.domain
#CRUD 작업할 때 객체형태로 주고받는 DTO클래스가 있는 패키지 설정
mybatis.configuration.map-underscore-to-camel-case=true
#자바객체의 카멜케이스를 DB의 언더스코어로 자동변환 (예 userId -> user_id)

# 인코딩 설정
spring.http.encoding.charset = utf-8
spring.http.encoding.enabled = true
spring.http.encoding.force = true

# Thymeleaf 설정
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false

# 파일업로드 이미지 출력 경로
file.upload.path = /Users/sanghyeonjung/Documents/blog/item
uploadPath = /blog/item
spring.servlet.multipart.max-file-size = 5MB
spring.servlet.multipart.max-request-size = 20MB

# 영화 API 설정 (나중에 실제 API 키로 변경)
app.movie.api.url=https://api.themoviedb.org/3
app.movie.api.key=dea3c483576e2816e9a6edbaf45c67c6

# AI 추천 (Gemini API - https://aistudio.google.com/apikey 에서 키 발급)
app.recommend.gemini.api-key=AIzaSyDL8WGDU_d4I-NAUfI0UkzMev-74p8mcRo
# gemini-2.0-flash는 무료 한도 0(단종 예정). 무료 한도 있음: gemini-2.5-flash
app.recommend.gemini.model=gemini-2.5-flash

# 추천 설정
#추천받기위한 리뷰개수
app.recommend.min-review-count=5
#하루에 추천받을 수 있는 횟수
app.recommend.rate-limit-daily=30
#요청 가능 시간 간격 (1분마다 가능)
app.recommend.rate-limit-per-minute=1
#추천결과 캐싱 사용 (true: db에 저장된 추천결과 사용 / false: 매번 ai api 호출)
app.recommend.cache-enabled=false

# 스케줄러 설정
# 자동 동기화 사용 여부
app.scheduler.movie-sync.enabled=true
# 기동 시 1회 동기화 실행 (개발/검증용, 로그 확인 시 true로 설정)
app.scheduler.movie-sync.run-on-startup=false
# cron 표현식: 초 분 시 일 월 요일
# 인기 영화 동기화: 매일 새벽 2시
app.scheduler.movie-sync.cron.popular=0 0 2 * * *
# 현재 상영작 동기화: 매일 새벽 3시
app.scheduler.movie-sync.cron.now-playing=0 0 3 * * *
# 개봉 예정작 동기화: 매일 새벽 4시
app.scheduler.movie-sync.cron.upcoming=0 0 4 * * *

# 메시지 프로퍼티 (한국어/일본어만 사용, UTF-8)
spring.messages.basename=messages
spring.messages.encoding=UTF-8
